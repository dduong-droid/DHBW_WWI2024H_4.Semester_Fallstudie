<h1 class="font-headline text-display-lg font-bold text-on-surface tracking-tight leading-tight">Erzähl uns von dir</h1>
<p class="font-body text-body-lg text-on-surface-variant mt-3">Diese Angaben helfen uns, einen auf dich abgestimmten Plan zu erstellen.</p>
</div>

<div class="bg-surface-container-lowest rounded-[1.5rem] p-6 shadow-[0_8px_30px_rgba(0,110,39,0.04)] space-y-6"><!-- Name Input -->
<div class="space-y-2">
<label class="block font-label text-label-md font-semibold text-on-surface-variant uppercase tracking-wider" for="name">Name</label>
<div class="relative">
<input class="block w-full rounded-lg border-none bg-surface-container-high py-4 px-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all" id="name" name="name" placeholder="z.B. Maria" type="text"/>
</div>
</div>
<!-- Age Input -->
<div class="space-y-2">
<label class="block font-label text-label-md font-semibold text-on-surface-variant uppercase tracking-wider" for="age">Alter</label>

<input class="block w-full rounded-lg border-none bg-surface-container-high py-4 pl-4 pr-12 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all" id="age" name="age" placeholder="z.B. 28" type="number"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">

</div>
</div>
</div>

<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
<span class="text-on-surface-variant font-body text-sm">kg</span>
</div>
</div>
</div>

<span class="flex flex-col">
<span class="block font-headline text-title-lg font-medium text-on-surface peer-checked:text-primary">Eher gering</span>
</span>
</span>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</label>

<span class="flex flex-col">
<span class="block font-headline text-title-lg font-medium text-on-surface peer-checked:text-primary">Normal</span>

</span>

</span>
</span>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
